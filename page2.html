<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Access Control</title>
<style>
  html, body {
    margin: 0;
    height: 100%;
    background-color: #000;
    color: #ffff00;
    font-family: "Courier New", monospace;
    overflow: hidden;
  }

  #container {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 90%;
    max-width: 800px;
    text-align: left;
    font-size: 1.2rem;
    line-height: 1.6rem;
    white-space: pre-wrap;
  }

  #checkboxes, #passwordField {
    margin-top: 20px;
    display: none;
  }

  #checkboxes label {
    display: inline-block;
    margin: 4px 6px;
    cursor: pointer;
  }

  #checkboxes input[type="checkbox"] {
    cursor: pointer;
    width: 18px;
    height: 18px;
  }

  #countdown {
    margin-top: 15px;
    display: none;
    font-size: 1.2rem;
  }

  input[type="password"] {
    background: #000;
    border: 1px solid #ffff00;
    color: #ffff00;
    font-family: "Courier New", monospace;
    padding: 5px;
    font-size: 1rem;
    width: 220px;
    outline: none;
  }

  button {
    background: transparent;
    border: 1px solid #ffff00;
    color: #ffff00;
    font-family: "Courier New", monospace;
    padding: 5px 10px;
    margin-left: 10px;
    cursor: pointer;
  }

  button:hover {
    background: #ffff00;
    color: #000;
  }

 .flash {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: #ffff00;
  opacity: 0;
  transition: opacity 0.4s ease;
  z-index: 100;
  pointer-events: none; /* 💡 теперь клики и ввод проходят сквозь */
}

  }

  @keyframes caret {
    50% { border-color: transparent; }
  }

  #text {
    border-right: 3px solid #ffff00;
    display: inline-block;
    animation: caret 1s step-end infinite;
  }

  /* Countdown flash effect */
  .red-flash {
    color: #ff0000;
    animation: redBlink 0.5s step-end infinite;
  }

  @keyframes redBlink {
    50% { color: #ffff00; }
  }

  /* Paused state */
  .paused {
    color: #00ff00;
  }
</style>
</head>
<body>

<div id="container">
  <div id="text"></div>
  <div id="checkboxes"></div>

  <div id="passwordField">
    <label>Enter password:</label>
    <input type="password" id="passwordInput" maxlength="20" autocomplete="off">
    <button id="submitBtn">OK</button>
  </div>

  <div id="countdown"></div>
</div>

<div class="flash" id="flash"></div>

<audio id="alertSound">
  <source src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg" type="audio/ogg">
</audio>

<script>
  const message = "If you have access authorization or an invitation to this website, enter the password or leave immediately!";
  const textEl = document.getElementById("text");
  const checkboxesEl = document.getElementById("checkboxes");
  const countdownEl = document.getElementById("countdown");
  const passwordField = document.getElementById("passwordField");
  const flashEl = document.getElementById("flash");
  const soundEl = document.getElementById("alertSound");
  const submitBtn = document.getElementById("submitBtn");

  let index = 0;
  let timer;
  let paused = false;
  let seconds = 13;
  let passwordEntered = false;

  // Typing animation
  function typeText() {
    if (index < message.length) {
      textEl.textContent += message.charAt(index);
      index++;
      setTimeout(typeText, 100);
    } else {
      showCheckboxes();
    }
  }

  // Show checkboxes + password input
  function showCheckboxes() {
    checkboxesEl.style.display = "block";
    for (let i = 1; i <= 8; i++) {
      const label = document.createElement("label");
      const box = document.createElement("input");
      box.type = "checkbox";
      box.addEventListener("change", handleCheckboxChange);
      label.appendChild(box);
      checkboxesEl.appendChild(label);
    }
    passwordField.style.display = "block";
    startCountdown();
  }

  // Countdown logic
  function startCountdown() {
    countdownEl.style.display = "block";
    countdownEl.textContent = `⏳ Countdown: ${seconds} sec`;

    timer = setInterval(() => {
      if (!paused && !passwordEntered) {
        seconds--;
        countdownEl.textContent = `⏳ Countdown: ${seconds} sec`;

        // Flash red in last 3 seconds
        if (seconds <= 3 && seconds > 0) {
          countdownEl.classList.add("red-flash");
        } else {
          countdownEl.classList.remove("red-flash");
        }

        if (seconds <= 0 && !passwordEntered) {
          clearInterval(timer);
          triggerAlert();
        }
      }
    }, 1000);
  }

  // Pause or resume when all boxes checked
  function handleCheckboxChange() {
    const boxes = checkboxesEl.querySelectorAll("input[type='checkbox']");
    const allChecked = Array.from(boxes).every(box => box.checked);

    if (allChecked && !paused) {
      paused = true;
      countdownEl.classList.add("paused");
      countdownEl.textContent = `⏸ Countdown paused at ${seconds} sec`;
    } else if (!allChecked && paused) {
      paused = false;
      countdownEl.classList.remove("paused");
      countdownEl.textContent = `⏳ Countdown: ${seconds} sec`;
    }
  }

  // Trigger alert + redirect back
  function triggerAlert() {
    soundEl.play().catch(()=>{});
    flashEl.style.opacity = 1;
    setTimeout(() => {
      window.location.href = "index.html"; // back to HU page
    }, 800);
  }

  // Password verification
  function checkPassword() {
    const input = document.getElementById("passwordInput").value.trim();
    if (input === "28031975") {
      passwordEntered = true;
      clearInterval(timer);
      flashEl.style.background = "#ffd7e6"; // pink flash
      flashEl.style.opacity = 1;
      setTimeout(() => {
        window.location.href = "page3.html"; // Sakura page
      }, 1000);
    }
  }

  submitBtn.addEventListener("click", checkPassword);
  document.getElementById("passwordInput").addEventListener("keydown", e => {
    if (e.key === "Enter") checkPassword();
  });

  // Start typing after 3s
  setTimeout(typeText, 3000);
</script>

</body>
</html>
