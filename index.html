<title>HU</title>
<style>
  html, body {
    margin: 0;
    height: 100%;
    background-color: #000;
    overflow: hidden;
  }

  .center-text {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-family: 'Arial Black', sans-serif;
    font-weight: bold;
    text-align: center;
    color: #ffff00;
    animation: pulse 8s ease-in-out infinite;
  }

  @media (min-width: 768px) {
    .center-text { font-size: 8vw; }
  }
  @media (max-width: 767px) {
    .center-text { font-size: 20vw; }
  }

  @keyframes pulse {
    0%, 100% { text-shadow: 0 0 60px rgba(255,255,0,0.9); color: #ffff00; }
    50% { text-shadow: 0 0 5px rgba(255,255,0,0.15); color: rgba(255,255,0,0.2); }
  }

  .envelope {
    position: absolute;
    bottom: 25px;
    left: 50%;
    transform: translateX(-50%);
    width: 38px;
    height: 26px;
    cursor: pointer;
    animation: pulse 8s ease-in-out infinite;
  }
  .envelope svg {
    width: 100%;
    height: 100%;
    stroke: #dcdc00;
    stroke-width: 2;
    fill: none;
    transition: filter 0.3s;
  }
  .envelope:hover svg {
    filter: drop-shadow(0 0 4px rgba(255,255,0,0.5));
  }
  @media (max-width: 767px) {
    .envelope { width: 20px; height: 14px; bottom: 12px; }
  }

  .door {
    position: absolute;
    top: 20px;
    right: 20px;
    width: 70px;
    height: 140px;
    background-color: #111;
    box-shadow: -6px 0 15px rgba(255,255,0,0.7);
    border: 2px solid #222;
    transform-origin: right center;
    transform: perspective(400px) rotateY(-25deg);
    transition: all 0.4s ease;
  }
  .door::after {
    content: '';
    position: absolute;
    left: -10px;
    top: 0;
    width: 12px;
    height: 100%;
    background: linear-gradient(90deg, rgba(255,255,0,0.8) 0%, rgba(255,255,0,0.1) 100%);
    filter: blur(3px);
    opacity: 1;
    transition: opacity 0.3s ease;
  }
  .door.closed { transform: perspective(400px) rotateY(0deg); }
  .door.closed::after { opacity: 0; }
  .door.opened {
    transform: perspective(400px) rotateY(-90deg);
    box-shadow: -20px 0 40px rgba(255,255,0,1);
  }
  .door.opened::after {
    opacity: 1;
    background: linear-gradient(90deg, rgba(255,255,0,1) 0%, rgba(255,255,0,0.4) 100%);
  }

  @media (max-width: 1024px) {
    .door { width: 35px; height: 70px; box-shadow: -3px 0 7px rgba(255,255,0,0.7); }
    .door::after { left: -5px; width: 6px; }
  }
</style>
</head>
<body>

<div class="door"></div>
<div class="center-text">HU</div>

<div class="envelope" onclick="openMail()">
  <svg viewBox="0 0 100 70">
    <rect x="5" y="5" width="90" height="60" rx="2" ry="2"/>
    <polyline points="5,5 50,38 95,5"/>
  </svg>
</div>

<script>
function openMail() {
  const email = "huuberger1@gmail.com";
  const subject = "Request";
  window.location.href = `mailto:${email}?subject=${encodeURIComponent(subject)}`;
}

const door = document.querySelector('.door');
let clickCount = 0;
const clicksToOpen = 13;
const nextPageURL = "page2.html"; // переход на вторую страницу

function handleDoorClick() {
  clickCount++;
  if (clickCount < clicksToOpen) {
    door.style.transform = "perspective(400px) rotateY(-22deg)";
    setTimeout(() => {
      door.style.transform = "perspective(400px) rotateY(-25deg)";
    }, 100);
  } else if (clickCount === clicksToOpen) {
    door.classList.add('opened');
    setTimeout(() => {
      window.location.href = nextPageURL;
    }, 2000);
  }
}

door.addEventListener('mouseenter', () => door.classList.add('closed'));
door.addEventListener('mouseleave', () => door.classList.remove('closed'));
door.addEventListener('touchstart', () => door.classList.add('closed'));
door.addEventListener('touchend', () => door.classList.remove('closed'));
door.addEventListener('click', handleDoorClick);
door.addEventListener('touchstart', handleDoorClick);
</script>

</body>
</html>
